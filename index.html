<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Matrimonio Davide & Tiziana</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f1ed;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.envelope {
  position:relative;
  width:300px;
  height:200px;
  background:#800020;
  cursor:pointer;
  overflow:hidden;
}

.flap {
  position:absolute;
  width:0;
  height:0;
  border-left:150px solid transparent;
  border-right:150px solid transparent;
  border-bottom:100px solid #5a0015;
  top:0;
  transform-origin:top;
  transition:0.6s;
}

.letter {
  position:absolute;
  width:90%;
  height:160px;
  background:white;
  top:30px;
  left:5%;
  padding:15px;
  text-align:center;
  transform:translateY(100px);
  transition:0.6s;
}

.open .flap {
  transform:rotateX(180deg);
}

.open .letter {
  transform:translateY(-80px);
}
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope()">
  <div class="flap"></div>
  <div class="letter">
    <h2>Davide & Tiziana</h2>
    <p>22 Agosto 2026</p>
    <p>Agriturismo La Moglietta</p>
  </div>
</div>

<script>
function openEnvelope() {
  document.querySelector('.envelope').classList.toggle('open');
}
</script>

</body>
</html>
