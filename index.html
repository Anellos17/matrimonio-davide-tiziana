<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrimonio Davide & Tiziana</title>

<style>
body {
  margin:0;
  background:#f5f1ed;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTENITORE */
.container {
  position:relative;
  width:320px;
  height:220px;
  cursor:pointer;
}

/* BASE BUSTA */
.base {
  position:absolute;
  width:100%;
  height:100%;
  background:#800020;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* FLAP TRIANGOLO */
.flap {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100px;
  background:#5a0015;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
  transform-origin:top;
  transition:0.6s ease;
  z-index:3;
}

/* LETTERA */
.letter {
  position:absolute;
  width:90%;
  background:white;
  top:40px;
  left:5%;
  padding:20px;
  border-radius:10px;
  text-align:center;
  transform:translateY(120px);
  transition:0.6s ease;
  z-index:2;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.base {
  background: linear-gradient(145deg, #800020, #6a001a);
}

/* TESTI */
h2 {
  margin:0;
  color:#800020;
}

p {
  margin:6px 0;
}

/* ANIMAZIONE */
.open .flap {
  transform:rotateX(180deg);
}

.open .letter {
  transform:translateY(-60px);
}
</style>
</head>

<body>

<div class="container" onclick="openEnvelope()">
  <div class="base"></div>
  <div class="flap"></div>

  <div class="letter">
    <h2>Davide & Tiziana</h2>
    <p>22 Agosto 2026</p>
    <p>Agriturismo La Moglietta</p>
    <p style="font-size:12px;">tocca la busta</p>
  </div>
</div>

<script>
function openEnvelope() {
  document.querySelector('.container').classList.toggle('open');
}
</script>

</body>
</html>
